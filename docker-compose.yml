  #     - backend
  #   restart: always


 

  # Qdrant (VectorDB)
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: qdrant
    ports:
      - "6333:6333"    # REST API (Dashboard & HTTP)
      - "6334:6334"    # gRPC API (Critical for Python Client)
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - backend
    restart: always

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus_data:/prometheus
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:11.6.0-ubuntu
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    env_file:
      - ./docker/env/.env.grafana
    depends_on:
      - prometheus
    networks:
      - backend
    restart: always


  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:v1.9.1
    container_name: node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      # Exclude common system AND WSL bind‑mount paths to stop duplicates
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|mnt/wsl)($$|/)'
      # Disable collectors that are unsupported in this environment
      - '--no-collector.netstat'
      - '--no-collector.softnet'
    networks:
      - backend
    restart: always


  # FastAPI Application
  #fastapi:
  #  build:
  #    context: .
  #    dockerfile: docker/Dockerfile
  #  container_name: fastapi
  #  ports:
  #    - "8000:8000"
  #  networks:
  #    - backend
  #  restart: always
  #  depends_on:
  #    rabbitmq:
  #      condition: service_healthy
  #    redis:
  #      condition: service_healthy
  #  env_file:
  #    - .env


  # RabbitMQ (Message Broker)
  rabbitmq:
    image: rabbitmq:4.1.2-management-alpine
    container_name: rabbitmq
    ports:
      - "5821:5821"   # AMQP port
      - "15672:15672" # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    env_file:
      - ./docker/env/.env.rabbitmq
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      timeout: 10s
      retries: 5

  # Redis (Results Backend & Cache)
  redis:
    image: redis:8.0.3-alpine
    container_name: redis
    ports:
      - "6426:6426"
    volumes:
      - redis_data:/data
    env_file:
      - ./docker/env/.env.redis
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-minirag_redis_2222} -p ${REDIS_PORT:-6426} ping | grep -q PONG"]
      timeout: 10s
      retries: 5
    command: [
      "redis-server",
      "--port", "${REDIS_PORT:-6426}",
      "--requirepass", "${REDIS_PASSWORD:-minirag_redis_2222}",
      "--appendonly", "${REDIS_APPENDONLY:-yes}",
      "--maxmemory", "${REDIS_MAXMEMORY:-512mb}",
      "--maxmemory-policy", "${REDIS_MAXMEMORY_POLICY:-allkeys-lru}",
      "--protected-mode", "${REDIS_PROTECTED_MODE:-yes}"
    ]

  # PostgreSQL (pgvector)
  pgvector:
    image: pgvector/pgvector:0.8.0-pg17
    container_name: pgvector
    ports:
      - "5432:5432"
    volumes:
      - 'pgvector:/var/lib/postgresql/data'
    env_file:
      - ./docker/env/.env.postgres
    networks:
      - backend
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s


  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.17.1
    container_name: postgres-exporter
    ports:
      - "9187:9187"
    env_file:
      - ./docker/env/.env.postgres-exporter
    depends_on:
      - pgvector
    networks:
      - backend
    restart: always


