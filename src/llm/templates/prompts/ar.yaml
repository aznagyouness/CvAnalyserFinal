  **تنبيه مهم:** لا تستخدم معرفتك الخاصة. يجب أن تجيب فقط بناءً على المستندات المقدمة.
  بما أنه لم يتم تقديم أي مستندات، يجب أن ترد بأنك لا تستطيع الإجابة على السؤال.
